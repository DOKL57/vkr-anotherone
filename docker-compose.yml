services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sound_rental}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sound_rental}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/sound_rental?schema=public}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-http://host.docker.internal:1234/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-auto}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:3001}
    ports:
      - "5173:5173"

  bot:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/bot/Dockerfile
    command: >
      sh -c "if [ -z \"$$TELEGRAM_BOT_TOKEN\" ]; then
        echo '[bot] disabled: TELEGRAM_BOT_TOKEN is empty';
        tail -f /dev/null;
      else
        npm run start -w @sound/bot;
      fi"
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: ${API_URL:-http://api:3001}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_API_URL: ${TELEGRAM_BOT_API_URL:-https://api.telegram.org}
      TELEGRAM_BOT_SESSION_FILE: ${TELEGRAM_BOT_SESSION_FILE:-/app/.runtime/telegram-bot-sessions.json}
      BOT_POLLING_INTERVAL: ${BOT_POLLING_INTERVAL:-1000}
    volumes:
      - bot_runtime:/app/.runtime

volumes:
  postgres_data:
  bot_runtime:
